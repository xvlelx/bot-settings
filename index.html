<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>봇 설정</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e6e8ee;--muted:#8a92a3;--accent:#4c8bf5;--ok:#2ecc71;--err:#e74c3c;--gold:#f5c451;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;padding:14px;padding-bottom:90px;}
  h1{font-size:18px;margin:0 0 12px;}
  h2{font-size:14px;margin:16px 0 8px;color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
  .conn .row{flex-direction:column;align-items:stretch;}
  .conn input{width:100%;margin-top:4px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
  .row label{font-size:13px;flex:1;}
  .row label .key{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
  input[type=number],input[type=text],input[type=password]{background:#11141a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;width:150px;font-size:13px;}
  input.wide{width:100%;}
  input[type=checkbox]{width:20px;height:20px;}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;}
  button.sec{background:#2a2f3a;}
  /* 탭 */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .tabs button{background:#161922;border:1px solid var(--line);color:var(--muted);padding:9px 12px;border-radius:10px;font-size:13px;white-space:nowrap;font-weight:600;}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .panel{display:none;}
  .panel.on{display:block;}
  /* 권한/차단 리스트 */
  .uitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .uname{font-size:14px;}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;margin-left:6px;}
  .b-super{background:rgba(245,196,81,.18);color:var(--gold);}
  .b-admin{background:rgba(76,139,245,.18);color:var(--accent);}
  .b-ban{background:rgba(231,76,60,.18);color:var(--err);}
  .roles{display:flex;gap:5px;}
  .roles button{padding:6px 9px;font-size:12px;background:#2a2f3a;}
  .roles button.on{background:var(--accent);}
  .roles button.on.super{background:var(--gold);color:#222;}
  .filter{width:100%;margin-bottom:8px;}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#0c0e12;border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;}
  .bar button{flex:1;}
  #status{font-size:13px;padding:8px 0;min-height:20px;}
  .muted{color:var(--muted);font-size:12px;}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
  .gatebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:320px;text-align:center;}
  .gatebox h2{border:0;margin:0 0 14px;color:var(--txt);}
  .gatebox input{width:100%;}
  .hidden{display:none !important;}
</style>
</head>

// ---- 탭/폼 빌드 ----
function buildTabs(){
  var nav="", pan="";
  for(var i=0;i<TABS.length;i++){

    nav+='<button id="tab_'+t.id+'" class="'+(i===0?"on":"")+'" onclick="showTab(\''+t.id+'\')">'+t.name+'</button>';

  }
  $("tabs").innerHTML=nav; $("panels").innerHTML=pan;
}

      var type=fields[key],id=fid(sec,key),ko=LABELS[key]||key;

function showTab(id){
  var t=TABS,i;
  for(i=0;i<t.length;i++){

// ---- 설정 폼 채우기/수집 ----
function fillForm(cfg){
  for(var sec in SCHEMA){
    var fields=SCHEMA[sec],src=(cfg&&cfg[sec])?cfg[sec]:{},def=DEFAULTS[sec]||{};
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));if(!el)continue;
      var v=(src[key]!==undefined&&src[key]!==null)?src[key]:def[key];
      if(type==="bool")el.checked=!!v; else el.value=(v===undefined||v===null)?"":v;
    }
  }
}
function collectForm(){
  var out={};
  for(var sec in SCHEMA){
    out[sec]={};var fields=SCHEMA[sec];
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));
      if(type==="bool")out[sec][key]=el.checked;
      else if(type==="text")out[sec][key]=el.value;
      else{var n=(type==="float")?parseFloat(el.value):parseInt(el.value,10);out[sec][key]=isNaN(n)?0:n;}
    }
  }
  return out;
}

// ---- 방장 탭 ----
function roleOf(hash){ if(arrHas(state.superAdmins,hash))return "super"; if(arrHas(state.admins,hash))return "admin"; return "user"; }
function setRole(hash,role){
  arrDel(state.superAdmins,hash); arrDel(state.admins,hash);
  if(role==="super")arrAdd(state.superAdmins,hash);
  else if(role==="admin")arrAdd(state.admins,hash);
  renderSuper();
}
function renderSuper(){
  var box=$("superList"); if(!box)return;
  var f=($("superFilter")&&$("superFilter").value||"").trim();
  var html="",hashes=[],h;
  for(h in roster.users)if(roster.users.hasOwnProperty(h))hashes.push(h);
  hashes.sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");});
  var shown=0;
  for(var i=0;i<hashes.length;i++){
    h=hashes[i];var nick=roster.users[h]||h;
    if(f&&nick.indexOf(f)===-1)continue;
    shown++;var role=roleOf(h);
    var badge=role==="super"?'<span class="badge b-super">방장</span>':role==="admin"?'<span class="badge b-admin">관리자</span>':'';
    html+='<div class="uitem"><div class="uname">'+esc(nick)+badge+'</div><div class="roles">'+
      '<button class="'+(role==="super"?"on super":"")+'" onclick="setRole(\''+h+'\',\'super\')">방장</button>'+
      '<button class="'+(role==="admin"?"on":"")+'" onclick="setRole(\''+h+'\',\'admin\')">관리자</button>'+
      '<button class="'+(role==="user"?"on":"")+'" onclick="setRole(\''+h+'\',\'user\')">일반</button>'+
      '</div></div>';
  }
  if(!shown)html='<div class="muted">'+(Object.keys(roster.users).length?"검색 결과 없음":"유저 목록이 비어있습니다. 봇이 켜져 roster를 올렸는지 확인하세요.")+'</div>';
  box.innerHTML=html;
}

// ---- 차단 탭 ----
function toggleBlock(key,on){ if(on)arrAdd(state.blockedRooms,key); else arrDel(state.blockedRooms,key); }
function renderBlock(){
  var box=$("blockList"); if(!box)return;
  var keys=[],seen={},k;
  for(k in roster.rooms)if(roster.rooms.hasOwnProperty(k)){keys.push(k);seen[k]=1;}
  for(var i=0;i<state.blockedRooms.length;i++)if(!seen[state.blockedRooms[i]])keys.push(state.blockedRooms[i]);
  if(!keys.length){box.innerHTML='<div class="muted">알려진 방이 없습니다. 봇이 메시지를 한 번 받은 방만 표시됩니다.</div>';return;}
  var html="";
  for(i=0;i<keys.length;i++){
    k=keys[i];var name=roster.rooms[k]||k,on=arrHas(state.blockedRooms,k);
    html+='<div class="uitem"><div class="uname">'+esc(name)+(on?'<span class="badge b-admin">차단됨</span>':'')+'</div>'+
      '<input type="checkbox" '+(on?"checked":"")+' onchange="toggleBlock(\''+jsq(k)+'\',this.checked)"></div>';
  }
  box.innerHTML=html;
}
// ---- 유저 차단(밴) ----
function toggleBan(hash,on){ if(on)arrAdd(state.banned,hash); else arrDel(state.banned,hash); renderBan(); }
function renderBan(){
  var box=$("banList"); if(!box)return;
  var f=($("banFilter")&&$("banFilter").value||"").trim();
  var hashes=[],h; for(h in roster.users)if(roster.users.hasOwnProperty(h))hashes.push(h);
  hashes.sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");});
  var html="",shown=0;
  for(var i=0;i<hashes.length;i++){
    h=hashes[i];var nick=roster.users[h]||h;
    if(f&&nick.indexOf(f)===-1)continue;
    shown++;var on=arrHas(state.banned,h);
    html+='<div class="uitem"><div class="uname">'+esc(nick)+(on?'<span class="badge b-ban">차단됨</span>':'')+'</div>'+
      '<input type="checkbox" '+(on?"checked":"")+' onchange="toggleBan(\''+h+'\',this.checked)"></div>';
  }
  if(!shown)html='<div class="muted">'+(Object.keys(roster.users).length?"검색 결과 없음":"유저 목록이 비어있습니다.")+'</div>';
  box.innerHTML=html;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function jsq(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

// ---- 관리 탭 (포인트/경험치 지급, 시즌 초기화) ----
function fillGiveUsers(){
  var sel=$("giveUser"); if(!sel)return;
  var hashes=[],h; for(h in roster.users)if(roster.users.hasOwnProperty(h))hashes.push(h);
  hashes.sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");});
  var html=""; for(var i=0;i<hashes.length;i++)html+='<option value="'+hashes[i]+'">'+esc(roster.users[hashes[i]]||hashes[i])+'</option>';
  sel.innerHTML=html||'<option value="">(유저 없음 — 봇 실행 확인)</option>';
}
function pushCmd(cmd,okMsg){
  var u=ep("/commands"); if(!u)return; saveConn(); setStatus("전송 중...",false);
  fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cmd)})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(){setStatus(okMsg+" — 봇이 곧 처리해요.",false);})
    .catch(function(e){setStatus("실패: "+e,true);});
}
function giveCmd(type){
  var sel=$("giveUser"); if(!sel||!sel.value){setStatus("대상 유저를 선택하세요.",true);return;}
  var amt=parseInt($("giveAmount").value,10); if(isNaN(amt)||amt===0){setStatus("금액(0 아님)을 입력하세요.",true);return;}
  var nick=roster.users[sel.value]||sel.value;
  pushCmd({type:type,hash:sel.value,amount:amt}, "✓ "+nick+"님 "+(type==="addPoints"?"포인트":"경험치")+" "+amt+" 지급 요청");
}
function seasonResetCmd(){
  if(!confirm("정말 시즌 초기화할까요?\n모든 유저의 포인트·레벨·칭호·전적·출석·채팅이 초기화됩니다."))return;
  pushCmd({type:"seasonReset"}, "✓ 시즌 초기화 요청");
}

// ---- Firebase ----
function ep(sub){
  var url=$("fbUrl").value.trim().replace(/\/+$/,""),auth=$("fbAuth").value.trim();
  if(!url){setStatus("RTDB URL을 입력하세요.",true);return null;}
  return url+sub+".json"+(auth?("?auth="+encodeURIComponent(auth)):"");
}
function setStatus(m,e){var s=$("status");s.textContent=m;s.style.color=e?"var(--err)":"var(--ok)";}
function saveConn(){try{localStorage.setItem("fbConn",JSON.stringify({url:$("fbUrl").value,auth:$("fbAuth").value}));}catch(e){}}
function loadConn(){try{var c=JSON.parse(localStorage.getItem("fbConn")||"{}");if(c.url)$("fbUrl").value=c.url;if(c.auth)$("fbAuth").value=c.auth;}catch(e){}}

function loadAll(){
  if(!ep("/botConfig"))return; saveConn(); setStatus("불러오는 중...",false);
  Promise.all([
    fetch(ep("/botConfig")).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch(ep("/roster")).then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(res){
    fillForm(res[0]||{});
    var ro=res[1]||{};
    rosterLoaded=!!res[1];
    roster.users=ro.users||{}; roster.rooms=ro.rooms||{};
    state.superAdmins=(ro.superAdmins||[]).slice();
    state.admins=(ro.admins||[]).slice();
    state.blockedRooms=(ro.blockedRooms||[]).slice();
    state.banned=(ro.banned||[]).slice();
    renderSuper(); renderBlock(); renderBan(); fillGiveUsers();
    setStatus("✓ 불러왔습니다."+(res[1]?"":" (roster 없음 — 봇 실행 확인)"),false);
  }).catch(function(e){setStatus("불러오기 실패: "+e,true);});
}
function saveAll(){
  if(!ep("/botConfig"))return; saveConn(); setStatus("저장 중...",false);
  var puts=[ fetch(ep("/botConfig"),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(collectForm())}) ];
  if(rosterLoaded){   // roster 못 불러왔으면 권한/차단을 덮어쓰지 않음(방장 잠금 방지)
    var adm=JSON.stringify({superAdmins:state.superAdmins,admins:state.admins,blockedRooms:state.blockedRooms,banned:state.banned});
    puts.push(fetch(ep("/adminState"),{method:"PUT",headers:{"Content-Type":"application/json"},body:adm}));
  }
  Promise.all(puts).then(function(rs){
    for(var i=0;i<rs.length;i++)if(!rs[i].ok)throw new Error("HTTP "+rs[i].status);
    setStatus("✓ 저장 완료!"+(rosterLoaded?"":" (권한/차단은 roster 미로딩이라 건너뜀)")+" 봇이 곧 반영합니다.",false);
  }).catch(function(e){setStatus("저장 실패: "+e,true);});
}

// ---- 비밀번호 잠금 ----
var PASSWORD="admin123";
function init(){
  buildTabs();
  fillForm({});
  renderSuper(); renderBlock(); renderBan(); fillGiveUsers();
  loadConn();
  if($("fbUrl").value) loadAll();
}
function unlock(){
  if($("pw").value===PASSWORD){ try{sessionStorage.setItem("ok","1");}catch(e){} $("gate").className="gate hidden"; init(); }
  else { $("pwErr").textContent="비밀번호가 틀렸습니다."; $("pw").value=""; }
}
var _ok=false; try{_ok=sessionStorage.getItem("ok")==="1";}catch(e){}
if(_ok){ $("gate").className="gate hidden"; init(); }
else { setTimeout(function(){ var p=$("pw"); if(p)p.focus(); },100); }
</script>
