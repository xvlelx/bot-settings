<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>봇 설정</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e6e8ee;--muted:#8a92a3;--accent:#4c8bf5;--ok:#2ecc71;--err:#e74c3c;--gold:#f5c451;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;padding:14px;padding-bottom:90px;}
  h1{font-size:18px;margin:0 0 12px;}
  h2{font-size:14px;margin:16px 0 8px;color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
  .conn .row{flex-direction:column;align-items:stretch;}
  .conn input{width:100%;margin-top:4px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
  .row label{font-size:13px;flex:1;}
  .row label .key{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
  input[type=number],input[type=text],input[type=password]{background:#11141a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;width:150px;font-size:13px;}
  input.wide{width:100%;}
  input[type=checkbox]{width:20px;height:20px;}
  input:disabled{opacity:.45;}
  select{background:#11141a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:13px;}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;}
  button.sec{background:#2a2f3a;}
  button:disabled{cursor:not-allowed;}
  /* 방 선택 바 */
  .rb2{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:10px;}
  .rb2 button{padding:8px 12px;font-size:12px;}
  .mark{font-size:11px;margin-left:5px;}
  .grp{font-size:12px;color:var(--accent);font-weight:700;margin:14px 0 2px;padding-bottom:4px;border-bottom:1px solid var(--line);}
  .grp:first-child{margin-top:0;}
  /* 탭 */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .tabs button{background:#161922;border:1px solid var(--line);color:var(--muted);padding:9px 12px;border-radius:10px;font-size:13px;white-space:nowrap;font-weight:600;}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .panel{display:none;}
  .panel.on{display:block;}
  /* 권한/차단 리스트 */
  .uitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .uname{font-size:14px;}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;margin-left:6px;}
  .b-super{background:rgba(245,196,81,.18);color:var(--gold);}
  .b-admin{background:rgba(76,139,245,.18);color:var(--accent);}
  .b-ban{background:rgba(231,76,60,.18);color:var(--err);}
  .roles{display:flex;gap:5px;}
  .roles button{padding:6px 9px;font-size:12px;background:#2a2f3a;}
  .roles button.on{background:var(--accent);}
  .roles button.on.super{background:var(--gold);color:#222;}
  .filter{width:100%;margin-bottom:8px;}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#0c0e12;border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;}
  .bar button{flex:1;}
  #status{font-size:13px;padding:8px 0;min-height:20px;}
  .muted{color:var(--muted);font-size:12px;}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
  .gatebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:320px;text-align:center;}
  .gatebox h2{border:0;margin:0 0 14px;color:var(--txt);}
  .gatebox input{width:100%;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="gatebox">
    <h2>🔒 로그인</h2>
    <input id="email" type="email" placeholder="이메일" onkeydown="if(event.key==='Enter')$('pw').focus()">
    <input id="pw" type="password" placeholder="비밀번호" style="margin-top:8px" onkeydown="if(event.key==='Enter')unlock()">
    <button id="loginBtn" onclick="unlock()" style="width:100%;margin-top:10px">입장</button>
    <div id="pwErr" class="muted" style="color:var(--err);margin-top:8px;min-height:16px"></div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div id="panels"></div>

<div class="bar">

// db.js:deepMerge 미러
function webDeepMerge(base, over) {
  var out = {}, k;
  for (k in base) if (base.hasOwnProperty(k)) {
    if (base[k] && typeof base[k] === "object" && !(base[k] instanceof Array)) out[k] = webDeepMerge(base[k], (over && over[k]) || {});
    else out[k] = (over && over.hasOwnProperty(k)) ? over[k] : base[k];
  }
  if (over) for (k in over) if (over.hasOwnProperty(k) && !out.hasOwnProperty(k)) out[k] = over[k];
  return out;
}
// db.js:cfg(rkey) 미러 — 방이 실제로 보게 될 값. 폼에 이걸 채워야 "전역 추종"이 눈에 보인다
function effectiveCfg(global, override) {
  if (!override) return global;
  var m = webDeepMerge(global, override), s;
  for (s in GLOBAL_SECS) if (GLOBAL_SECS.hasOwnProperty(s)) m[s] = global[s];
  return m;
}

function diffPin(global, form) {
  var out = {}, has = false, sec, key, g, f, secOut, secHas;
  for (sec in form) if (form.hasOwnProperty(sec)) {
    if (GLOBAL_SECS[sec]) continue;
    g = global[sec] || {}; f = form[sec]; secOut = {}; secHas = false;
    for (key in f) if (f.hasOwnProperty(key)) {
      if (GLOBAL_KEYS[key]) continue;
      if (g[key] !== f[key]) { secOut[key] = f[key]; secHas = true; }
    }
    if (secHas) { out[sec] = secOut; has = true; }
  }
  return has ? out : null;
}

function roomLabel(ro, key) {
  var reg = ro.registered || [], i;
  for (i = 0; i < reg.length; i++) if (reg[i].key === key) return reg[i].n + "방 " + reg[i].name;
  return (ro.rooms && ro.rooms[key]) || key;   // 미등록 방은 봇이 본 이름으로, 그것도 없으면 키
}
function roomOptions(registered) {
  var out = [{ v: GLOBAL_SEL, label: "🌐 전역" }], i;
  registered = registered || [];
  for (i = 0; i < registered.length; i++) out.push({ v: registered[i].key, label: registered[i].n + "방 " + registered[i].name });
  return out;
}
// 드롭다운 범위의 유저. 전역이면 방별 그룹(+미분류), 방이면 그 방 사람만.
// hash 가 방마다 달라 한 사람이 여러 그룹에 나올 수 있다 — 그게 정상이다.
function usersInScope(ro, scope) {
  var reg = ro.registered || [], urooms = ro.userRooms || {}, us = ro.users || {};
  var byKey = {}, order = [], out = [], i, h, k;
  function grp(key, name) {
    if (!byKey[key]) { byKey[key] = { key: key, name: name, hashes: [] }; order.push(key); }
    return byKey[key];
  }
  if (scope !== GLOBAL_SEL) {
    var g = grp(scope, roomLabel(ro, scope));
    for (h in us) if (us.hasOwnProperty(h) && urooms[h] === scope) g.hashes.push(h);
    return g.hashes.length ? [g] : [];
  }
  for (i = 0; i < reg.length; i++) grp(reg[i].key, reg[i].n + "방 " + reg[i].name);   // 방 번호순 먼저 자리를 잡아둔다
  for (h in us) if (us.hasOwnProperty(h)) {
    k = urooms[h] || "__none__";                                                       // roomKey 없는 옛 레코드
    grp(k, k === "__none__" ? "미분류" : roomLabel(ro, k)).hashes.push(h);
  }
  for (i = 0; i < order.length; i++) if (byKey[order[i]].hashes.length) out.push(byKey[order[i]]);
  out.sort(function (a, b) { return (a.key === "__none__" ? 1 : 0) - (b.key === "__none__" ? 1 : 0); });
  return out;
}

// ---- 설정 폼 채우기/수집 ----
function fillForm(cfg){
  for(var sec in SCHEMA){
    var fields=SCHEMA[sec],src=(cfg&&cfg[sec])?cfg[sec]:{},def=DEFAULTS[sec]||{};
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));if(!el)continue;
      var v=(src[key]!==undefined&&src[key]!==null)?src[key]:def[key];
      if(type==="bool")el.checked=!!v; else el.value=(v===undefined||v===null)?"":v;
    }
  }
}
function collectForm(){
  var out={};
  for(var sec in SCHEMA){
    out[sec]={};var fields=SCHEMA[sec];
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));
      if(type==="bool")out[sec][key]=el.checked;
      else if(type==="text")out[sec][key]=el.value;
      else{var n=(type==="float")?parseFloat(el.value):parseInt(el.value,10);out[sec][key]=isNaN(n)?0:n;}
    }
  }
  return out;
}

// ---- 방장 탭 ----
function roleOf(hash){ if(arrHas(state.superAdmins,hash))return "super"; if(arrHas(state.admins,hash))return "admin"; return "user"; }
function setRole(hash,role){
  arrDel(state.superAdmins,hash); arrDel(state.admins,hash);
  if(role==="super")arrAdd(state.superAdmins,hash);
  else if(role==="admin")arrAdd(state.admins,hash);
  renderSuper();
}
// 그룹 헤더는 전역에서만. 방을 고르면 그 방 사람만 나오니 헤더가 군더더기다
function grpHead(g){ return (sel===GLOBAL_SEL)?'<div class="grp">'+esc(g.name)+'</div>':''; }
function sortedHashes(g){ return g.hashes.slice().sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");}); }
function emptyMsg(){ return '<div class="muted">'+(Object.keys(roster.users).length?"해당 범위에 표시할 유저가 없습니다.":"유저 목록이 비어있습니다. 봇이 켜져 roster를 올렸는지 확인하세요.")+'</div>'; }
function renderSuper(){
  var box=$("superList"); if(!box)return;
  var f=($("superFilter")&&$("superFilter").value||"").trim();
  var groups=usersInScope(roster,sel),html="",shown=0,gi,i,h,hs,rows;
  for(gi=0;gi<groups.length;gi++){
    hs=sortedHashes(groups[gi]); rows="";
    for(i=0;i<hs.length;i++){
      h=hs[i];var nick=roster.users[h]||h;
      if(f&&nick.indexOf(f)===-1)continue;
      shown++;var role=roleOf(h);
      var badge=role==="super"?'<span class="badge b-super">방장</span>':role==="admin"?'<span class="badge b-admin">관리자</span>':'';
      rows+='<div class="uitem"><div class="uname">'+esc(nick)+badge+'</div><div class="roles">'+
        '<button class="'+(role==="super"?"on super":"")+'" onclick="setRole(\''+h+'\',\'super\')">방장</button>'+
        '<button class="'+(role==="admin"?"on":"")+'" onclick="setRole(\''+h+'\',\'admin\')">관리자</button>'+
        '<button class="'+(role==="user"?"on":"")+'" onclick="setRole(\''+h+'\',\'user\')">일반</button>'+
        '</div></div>';
    }
    if(rows)html+=grpHead(groups[gi])+rows;
  }
  box.innerHTML=shown?html:emptyMsg();
}

// ---- 차단 탭 ----
function toggleBlock(key,on){ if(on)arrAdd(state.blockedRooms,key); else arrDel(state.blockedRooms,key); }
function renderBlock(){
  var box=$("blockList"); if(!box)return;
  var keys=[],seen={},k;
  for(k in roster.rooms)if(roster.rooms.hasOwnProperty(k)){keys.push(k);seen[k]=1;}
  for(var i=0;i<state.blockedRooms.length;i++)if(!seen[state.blockedRooms[i]])keys.push(state.blockedRooms[i]);
  if(!keys.length){box.innerHTML='<div class="muted">알려진 방이 없습니다. 봇이 메시지를 한 번 받은 방만 표시됩니다.</div>';return;}
  var html="";
  for(i=0;i<keys.length;i++){
    k=keys[i];var name=roster.rooms[k]||k,on=arrHas(state.blockedRooms,k);
    html+='<div class="uitem"><div class="uname">'+esc(name)+(on?'<span class="badge b-admin">차단됨</span>':'')+'</div>'+
      '<input type="checkbox" '+(on?"checked":"")+' onchange="toggleBlock(\''+jsq(k)+'\',this.checked)"></div>';
  }
  box.innerHTML=html;
}

function pushCmd(cmd,okMsg){
  if(!ep("/commands"))return; saveConn(); setStatus("전송 중...",false);
  ensureToken().then(function(){
    return fetch(ep("/commands"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cmd)});
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(){setStatus(okMsg+" — 봇이 곧 처리해요.",false);})
    .catch(function(e){netFail(e,"실패: ");});
}
function giveCmd(type){
  var box=$("giveUser"); if(!box||!box.value){setStatus("대상 유저를 선택하세요.",true);return;}
  var amt=parseInt($("giveAmount").value,10); if(isNaN(amt)||amt===0){setStatus("금액(0 아님)을 입력하세요.",true);return;}
  var nick=roster.users[box.value]||box.value;   // hash 직접 지정이라 방 구분이 이미 정확하다
  pushCmd({type:type,hash:box.value,amount:amt}, "✓ "+nick+"님 "+(type==="addPoints"?"포인트":"경험치")+" "+amt+" 지급 요청");
}

// ===== 인증 (Firebase Auth 이메일/비번 → 1시간짜리 idToken) =====
// 웹 API 키는 비밀이 아니다 — 프로젝트 식별자일 뿐이다. 실제 방어는 RTDB 규칙의 auth.uid 검사이고,
// 콘솔에서 가입(sign-up)을 꺼두지 않으면 누구나 계정을 만들어 auth != null 을 통과한다
var FB_API_KEY="AIzaSyDPLsBadmYrsYH7UtxnZQRQRgJixDwzhOM";
var IDT_URL="https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=";
var TOK_URL="https://securetoken.googleapis.com/v1/token?key=";
var RT_KEY="fbRefresh";   // sessionStorage — 탭을 닫으면 사라진다. localStorage 는 쓰지 않는다

var idToken="",refreshTok="",tokenExp=0;

// 만료 60초 전부터 갱신한다. exp=0 은 미로그인
function tokenFresh(exp,now){ return exp>0 && now < exp-60000; }

function authFail(r){ return r.json().catch(function(){return{};}).then(function(j){ throw new Error((j.error&&j.error.message)||("HTTP "+r.status)); }); }
function takeToken(j){
  idToken=j.idToken||j.id_token||"";
  refreshTok=j.refreshToken||j.refresh_token||"";
  tokenExp=Date.now()+(parseInt(j.expiresIn||j.expires_in,10)||3600)*1000;
  try{sessionStorage.setItem(RT_KEY,refreshTok);}catch(e){}
}
function signIn(email,pw){
  return fetch(IDT_URL+FB_API_KEY,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email,password:pw,returnSecureToken:true})})
    .then(function(r){return r.ok?r.json():authFail(r);}).then(takeToken);
}
function refreshAuth(){
  if(!refreshTok)return Promise.reject(new Error("NO_REFRESH_TOKEN"));
  return fetch(TOK_URL+FB_API_KEY,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"grant_type=refresh_token&refresh_token="+encodeURIComponent(refreshTok)})
    .then(function(r){return r.ok?r.json():authFail(r);}).then(takeToken);
}
// 네트워크 동작 직전에만 확인한다. 노트북이 잠들어 setInterval 이 멎어도 안전하다
function ensureToken(){ return tokenFresh(tokenExp,Date.now())?Promise.resolve():refreshAuth(); }
function signOut(){
  idToken="";refreshTok="";tokenExp=0;
  try{sessionStorage.removeItem(RT_KEY);}catch(e){}
  $("gate").className="gate"; $("pw").value=""; $("pwErr").textContent="";
  setTimeout(function(){$("pw").focus();},100);
}
// 세션이 끊긴 채로 화면에 남아 있지 않게, 실패하면 곧장 로그인으로 돌린다
function onAuthLost(){ signOut(); $("pwErr").textContent="세션이 만료됐습니다. 다시 로그인하세요."; }
// 401 = 토큰이 죽었거나 규칙이 이 uid 를 거부. 어느 쪽이든 화면에 남겨둘 이유가 없다
function netFail(e,prefix){
  var m=String(e);
  if(m.indexOf("401")!==-1||m.indexOf("NO_REFRESH_TOKEN")!==-1||m.indexOf("TOKEN_EXPIRED")!==-1){onAuthLost();return;}
  setStatus(prefix+m,true);
}

// ---- Firebase ----
function ep(sub){
  var url=$("fbUrl").value.trim().replace(/\/+$/,"");
  if(!url){setStatus("RTDB URL을 입력하세요.",true);return null;}
  return url+sub+".json?auth="+encodeURIComponent(idToken);
}
function setStatus(m,e){var s=$("status");s.textContent=m;s.style.color=e?"var(--err)":"var(--ok)";}
function saveConn(){try{localStorage.setItem("fbConn",JSON.stringify({url:$("fbUrl").value}));}catch(e){}}
function loadConn(){try{var c=JSON.parse(localStorage.getItem("fbConn")||"{}");if(c.url)$("fbUrl").value=c.url;}catch(e){}}
// RTDB 는 권한 거부에 401 + {"error":"Permission denied"} 본문을 준다.
// r.ok 를 안 보면 그 에러 객체가 설정으로 둔갑해 폼에 채워진다
function jsonOk(r){ if(!r.ok)throw new Error("HTTP "+r.status); return r.json(); }

// 🚨 /rooms/{key} 나 /rooms 를 통째로 쓰지 말 것. name 은 봇이 발행하는 sentinel 이고,
//    그게 사라지면 봇이 "웹이 지웠다" 와 "DB가 비었다" 를 구분 못 한다 (Phase 6.2)
function roomCfgPath(key){ return "/rooms/"+encodeURIComponent(key)+"/botConfig"; }

function loadAll(){
  if(!ep("/global/botConfig"))return; saveConn(); setStatus("불러오는 중...",false);
  ensureToken().then(function(){
    return Promise.all([
      fetch(ep("/global/botConfig")).then(jsonOk),
      fetch(ep("/rooms")).then(jsonOk),
      // roster 만 관대하게 — 없으면 rosterLoaded=false 가드가 /adminState 덮어쓰기를 막는다
      fetch(ep("/roster")).then(jsonOk).catch(function(){return null;})
    ]);
  }).then(function(res){
    globalCfg=res[0]||{};
    roomCfgs={}; var nodes=res[1]||{},k;
    for(k in nodes)if(nodes.hasOwnProperty(k)&&nodes[k]&&typeof nodes[k]==="object")roomCfgs[k]=nodes[k].botConfig||null;
    var ro=res[2]||{};
    rosterLoaded=!!res[2];
    roster.users=ro.users||{}; roster.rooms=ro.rooms||{};
    roster.userRooms=ro.userRooms||{}; roster.registered=ro.registered||[];
    state.superAdmins=(ro.superAdmins||[]).slice();
    state.admins=(ro.admins||[]).slice();
    state.blockedRooms=(ro.blockedRooms||[]).slice();
    state.banned=(ro.banned||[]).slice();
    buildRoomBar(); onRoomChange(); renderBlock();   // onRoomChange 가 폼·유저목록을 다시 그린다
    setStatus("✓ 불러왔습니다."+(res[2]?"":" (roster 없음 — 봇 실행 확인)"),false);
  }).catch(function(e){netFail(e,"불러오기 실패: ");});
}
function saveAll(){
  if(!ep("/global/botConfig"))return; saveConn(); setStatus("저장 중...",false);
  ensureToken().then(doSave).catch(function(e){netFail(e,"저장 실패: ");});
}
function doSave(){
  var form=collectForm(),puts=[],msg,ov;
  if(sel===GLOBAL_SEL){
    globalCfg=form;
    puts.push(fetch(ep("/global/botConfig"),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(form)}));
    msg="✓ 전역 저장 완료!";
  }else{
    ov=diffPin(globalCfg,form); roomCfgs[sel]=ov;
    if(ov)puts.push(fetch(ep(roomCfgPath(sel)),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(ov)}));
    else   puts.push(fetch(ep(roomCfgPath(sel)),{method:"DELETE"}));   // 전역과 전부 같으면 오버라이드를 남기지 않는다
    msg=ov?("✓ "+roomLabel(roster,sel)+" 저장 완료! (고정 "+pinCount(ov)+"개)"):("✓ "+roomLabel(roster,sel)+" — 전역을 따릅니다.");
  }
  if(rosterLoaded){   // roster 못 불러왔으면 권한/차단을 덮어쓰지 않음(방장 잠금 방지)
    // state 배열은 렌더만 필터링될 뿐 항상 전 방을 담고 있다 — 방 탭에서 저장해도 다른 방 방장이 안 지워진다
    var adm=JSON.stringify({superAdmins:state.superAdmins,admins:state.admins,blockedRooms:state.blockedRooms,banned:state.banned});
    puts.push(fetch(ep("/adminState"),{method:"PUT",headers:{"Content-Type":"application/json"},body:adm}));
  }
  return Promise.all(puts).then(function(rs){
    for(var i=0;i<rs.length;i++)if(!rs[i].ok)throw new Error("HTTP "+rs[i].status);
    applyScopeUI();
    setStatus(msg+(rosterLoaded?"":" (권한/차단은 roster 미로딩이라 건너뜀)")+" 봇이 곧 반영합니다.",false);
  });
}
function followGlobal(){
  if(sel===GLOBAL_SEL)return;
  var name=roomLabel(roster,sel);
  if(!confirm(name+" 의 방별 설정을 전부 지우고 전역을 따르게 할까요?"))return;
  if(!ep(roomCfgPath(sel)))return; saveConn(); setStatus("전역 따르기 적용 중...",false);
  ensureToken().then(function(){
    return fetch(ep(roomCfgPath(sel)),{method:"DELETE"});   // 토큰이 갱신됐을 수 있어 URL 을 다시 만든다
  }).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    roomCfgs[sel]=null;
    fillForm(globalCfg); applyScopeUI();
    setStatus("✓ "+name+" 이(가) 전역을 따릅니다. 봇이 곧 반영합니다.",false);
  }).catch(function(e){netFail(e,"실패: ");});
}

// ---- 로그인 ----
function init(){
  buildTabs();
  buildRoomBar();
  fillForm({});
  applyScopeUI(); renderBlock();
  loadConn();
  if($("fbUrl").value) loadAll();
}
function enter(email){
  $("gate").className="gate hidden";
  $("whoami").textContent=email||"";
  $("pw").value="";
  init();
}
function unlock(){
  var email=$("email").value.trim(),pw=$("pw").value,btn=$("loginBtn");
  if(!email||!pw){ $("pwErr").textContent="이메일과 비밀번호를 입력하세요."; return; }
  btn.disabled=true; $("pwErr").textContent="확인 중...";
  signIn(email,pw).then(function(){
    btn.disabled=false;
    try{localStorage.setItem("fbEmail",email);}catch(e){}   // 비번은 저장하지 않는다
    enter(email);
  }).catch(function(e){
    btn.disabled=false;
    $("pwErr").textContent="로그인 실패: "+String(e).replace("Error: ","");
    $("pw").value="";
  });
}
// 새로고침 복구 — refresh 토큰은 sessionStorage 라 탭을 닫으면 사라진다
(function boot(){
  try{ refreshTok=sessionStorage.getItem(RT_KEY)||""; }catch(e){}
  try{ $("email").value=localStorage.getItem("fbEmail")||""; }catch(e){}
  if(refreshTok){
    refreshAuth().then(function(){ enter($("email").value); })
                 .catch(function(){ signOut(); });
    return;
  }
  setTimeout(function(){ $("email").focus(); },100);
})();
</script>
