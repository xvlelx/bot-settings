<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>봇 설정</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e6e8ee;--muted:#8a92a3;--accent:#4c8bf5;--ok:#2ecc71;--err:#e74c3c;--gold:#f5c451;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;padding:14px;padding-bottom:90px;}
  h1{font-size:18px;margin:0 0 12px;}
  h2{font-size:14px;margin:16px 0 8px;color:var(--accent);border-bottom:1px solid var(--line);padding-bottom:6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
  .conn .row{flex-direction:column;align-items:stretch;}
  .conn input{width:100%;margin-top:4px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
  .row label{font-size:13px;flex:1;}
  .row label .key{font-size:11px;color:var(--muted);display:block;margin-top:1px;}
  input[type=number],input[type=text],input[type=password]{background:#11141a;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;width:150px;font-size:13px;}
  input.wide{width:100%;}
  input[type=checkbox]{width:20px;height:20px;}
  button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;}
  button.sec{background:#2a2f3a;}
  /* 탭 */
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .tabs button{background:#161922;border:1px solid var(--line);color:var(--muted);padding:9px 12px;border-radius:10px;font-size:13px;white-space:nowrap;font-weight:600;}
  .tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .panel{display:none;}
  .panel.on{display:block;}
  /* 권한/차단 리스트 */
  .uitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .uname{font-size:14px;}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;margin-left:6px;}
  .b-super{background:rgba(245,196,81,.18);color:var(--gold);}
  .b-admin{background:rgba(76,139,245,.18);color:var(--accent);}
  .b-ban{background:rgba(231,76,60,.18);color:var(--err);}
  .roles{display:flex;gap:5px;}
  .roles button{padding:6px 9px;font-size:12px;background:#2a2f3a;}
  .roles button.on{background:var(--accent);}
  .roles button.on.super{background:var(--gold);color:#222;}
  .filter{width:100%;margin-bottom:8px;}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#0c0e12;border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:10px;}
  .bar button{flex:1;}
  #status{font-size:13px;padding:8px 0;min-height:20px;}
  .muted{color:var(--muted);font-size:12px;}
  .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
  .gatebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;width:100%;max-width:320px;text-align:center;}
  .gatebox h2{border:0;margin:0 0 14px;color:var(--txt);}
  .gatebox input{width:100%;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="gatebox">
    <h2>🔒 비밀번호</h2>
    <input id="pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()" style="width:100%;margin-top:10px">입장</button>
    <div id="pwErr" class="muted" style="color:var(--err);margin-top:8px;min-height:16px"></div>
  </div>
</div>

<h1>⚙️ 봇 설정</h1>

<div class="card conn">
  <div class="row"><label>RTDB URL</label><input id="fbUrl" type="text" value="https://kakaobot-1df67-default-rtdb.asia-southeast1.firebasedatabase.app"></div>
  <div class="row"><label>비밀키/토큰 <span class="muted">(공개 규칙이면 비움)</span></label><input id="fbAuth" type="password" placeholder="비워두세요"></div>
</div>

<div class="tabs" id="tabs"></div>

<div id="panels"></div>

<div class="bar">
  <button class="sec" onclick="loadAll()">⬇ 불러오기</button>
  <button onclick="saveAll()">💾 저장</button>
</div>
<div id="status"></div>

<script>
// ===== 설정 스키마 =====
var SCHEMA = {
  "포인트설정":{CHAT_POINT:"int",CHAT_EXP:"int",ATTENDANCE_REWARD:"int",ATTENDANCE_EXP:"int",LEVELUP_REWARD:"int",GAMBLE_MIN:"int",GAMBLE_MAX_PERCENT:"int",CHAT_MIN_LEN:"int"},
  "럭키박스설정":{LUCKY_BOX_CHANCE:"float",LUCKY_BOX_MIN_POINTS:"int",LUCKY_BOX_MAX_POINTS:"int",LUCKY_BOX_MIN_EXP:"int",LUCKY_BOX_MAX_EXP:"int"},
  "게임보상":{BASEBALL_REWARD:"int",WORD_REWARD:"int",TYPING_REWARD:"int",CHOSUNG_REWARD:"int",BALANCE_REWARD:"int",SUTDA_BONUS:"int",SUTDA_REFUND:"int",SUTDA_FEE:"int",LOTTO_PRICE:"int",LOTTO_FIRST_PRIZE:"int",LOTTO_SECOND_PRIZE:"int",LOTTO_THIRD_PRIZE:"int",RPS_FEE:"int",RPS_WIN:"int",RPS_DRAW:"int",RPS_DAILY_LIMIT:"int",BASEBALL_EXP:"int",WORD_EXP:"int",TYPING_EXP:"int",CHOSUNG_EXP:"int",BALANCE_EXP:"int"},

  "기능활성화":{POINT_SYSTEM_ENABLED:"bool",LEVEL_SYSTEM_ENABLED:"bool",CHAT_COUNT_ENABLED:"bool",LUCKY_BOX_ENABLED:"bool",TRANSFER_ENABLED:"bool",GAMBLE_ENABLED:"bool",SHOP_ENABLED:"bool",MENTION_ENABLED:"bool",GAME_BASEBALL_ENABLED:"bool",GAME_LOTTO_ENABLED:"bool",GAME_WORDCHAIN_ENABLED:"bool",GAME_CHOSUNG_ENABLED:"bool",GAME_TYPING_ENABLED:"bool",GAME_BALANCE_ENABLED:"bool",GAME_SUTDA_ENABLED:"bool",GAME_RPS_ENABLED:"bool",PROFILE_DETECTION_ENABLED:"bool",INACTIVE_USER_TRACKING:"bool"}
};
var DEFAULTS = {
  "포인트설정":{CHAT_POINT:1,CHAT_EXP:1,ATTENDANCE_REWARD:100,ATTENDANCE_EXP:30,LEVELUP_REWARD:50,GAMBLE_MIN:1000,GAMBLE_MAX_PERCENT:100,CHAT_MIN_LEN:3},
  "럭키박스설정":{LUCKY_BOX_CHANCE:0.005,LUCKY_BOX_MIN_POINTS:50,LUCKY_BOX_MAX_POINTS:200,LUCKY_BOX_MIN_EXP:10,LUCKY_BOX_MAX_EXP:50},
  "게임보상":{BASEBALL_REWARD:100,WORD_REWARD:50,TYPING_REWARD:80,CHOSUNG_REWARD:30,BALANCE_REWARD:100,SUTDA_BONUS:50,SUTDA_REFUND:75,SUTDA_FEE:100,LOTTO_PRICE:100,LOTTO_FIRST_PRIZE:1000,LOTTO_SECOND_PRIZE:500,LOTTO_THIRD_PRIZE:100,RPS_FEE:500,RPS_WIN:2000,RPS_DRAW:1000,RPS_DAILY_LIMIT:20,BASEBALL_EXP:30,WORD_EXP:20,TYPING_EXP:25,CHOSUNG_EXP:15,BALANCE_EXP:20},
  "출석보너스":{DAY_7_BONUS:50,DAY_14_BONUS:50,DAY_21_BONUS:50,DAY_28_BONUS:50},
  "시스템설정":{ATTENDANCE_START_HOUR:6,JOIN_MESSAGE_ENABLED:true,LEAVE_MESSAGE_ENABLED:false},
  "생일설정":{BIRTHDAY_BONUS_POINTS:2000,BIRTHDAY_BONUS_ENABLED:true,BIRTHDAY_AUTO_MESSAGE:true,BIRTHDAY_TITLE:"생일 주인공"},
  "타로설정":{GROQ_API_KEY:"",GROQ_MODEL:"llama-3.3-70b-versatile"},
  "기능활성화":{POINT_SYSTEM_ENABLED:true,LEVEL_SYSTEM_ENABLED:true,CHAT_COUNT_ENABLED:true,LUCKY_BOX_ENABLED:true,TRANSFER_ENABLED:true,GAMBLE_ENABLED:true,SHOP_ENABLED:true,MENTION_ENABLED:true,GAME_BASEBALL_ENABLED:true,GAME_LOTTO_ENABLED:true,GAME_WORDCHAIN_ENABLED:true,GAME_CHOSUNG_ENABLED:true,GAME_TYPING_ENABLED:true,GAME_BALANCE_ENABLED:true,GAME_SUTDA_ENABLED:true,GAME_RPS_ENABLED:true,PROFILE_DETECTION_ENABLED:true,INACTIVE_USER_TRACKING:true}
};
var LABELS = {
  CHAT_POINT:"채팅 1회 포인트",CHAT_EXP:"채팅 1회 경험치",ATTENDANCE_REWARD:"출석 보상 포인트",ATTENDANCE_EXP:"출석 경험치",LEVELUP_REWARD:"레벨업 보상 포인트",GAMBLE_MIN:"도박 최소 베팅",GAMBLE_MAX_PERCENT:"도박 최대 변동률(%)",CHAT_MIN_LEN:"보상 최소 글자수",
  LUCKY_BOX_CHANCE:"럭키박스 확률 (0~1)",LUCKY_BOX_MIN_POINTS:"럭키박스 최소 포인트",LUCKY_BOX_MAX_POINTS:"럭키박스 최대 포인트",LUCKY_BOX_MIN_EXP:"럭키박스 최소 경험치",LUCKY_BOX_MAX_EXP:"럭키박스 최대 경험치",
  BASEBALL_REWARD:"숫자야구 승리 포인트",WORD_REWARD:"끝말잇기 승리 포인트",TYPING_REWARD:"타자게임 승리 포인트",CHOSUNG_REWARD:"초성게임 정답 포인트",BALANCE_REWARD:"밸런스게임 보상 포인트",SUTDA_BONUS:"섯다 우승 보너스",SUTDA_REFUND:"섯다 무승부 환불(%)",SUTDA_FEE:"섯다 참가비",LOTTO_PRICE:"로또 1장 가격",LOTTO_FIRST_PRIZE:"로또 1등 상금",LOTTO_SECOND_PRIZE:"로또 2등 상금",LOTTO_THIRD_PRIZE:"로또 3등 상금",RPS_FEE:"가위바위보 참가비",RPS_WIN:"가위바위보 승리 포인트",RPS_DRAW:"가위바위보 무승부 포인트",RPS_DAILY_LIMIT:"가위바위보 하루 횟수",BASEBALL_EXP:"숫자야구 경험치",WORD_EXP:"끝말잇기 경험치",TYPING_EXP:"타자게임 경험치",CHOSUNG_EXP:"초성게임 경험치",BALANCE_EXP:"밸런스게임 경험치",
  DAY_7_BONUS:"7일 연속 보너스",DAY_14_BONUS:"14일 연속 보너스",DAY_21_BONUS:"21일 연속 보너스",DAY_28_BONUS:"28일 연속 보너스",
  ATTENDANCE_START_HOUR:"출석 시작 시각 (시)",JOIN_MESSAGE_ENABLED:"입장 인사 메시지",LEAVE_MESSAGE_ENABLED:"퇴장 메시지",
  BIRTHDAY_BONUS_POINTS:"생일 축하 포인트",BIRTHDAY_BONUS_ENABLED:"생일 포인트 지급",BIRTHDAY_AUTO_MESSAGE:"생일 자동 축하 메시지",BIRTHDAY_TITLE:"생일 칭호 이름",
  GROQ_API_KEY:"Groq API 키",GROQ_MODEL:"Groq 모델명",
  POINT_SYSTEM_ENABLED:"포인트 시스템",LEVEL_SYSTEM_ENABLED:"레벨 시스템",CHAT_COUNT_ENABLED:"채팅수 집계",LUCKY_BOX_ENABLED:"럭키박스",TRANSFER_ENABLED:"포인트 이체",GAMBLE_ENABLED:"도박",SHOP_ENABLED:"상점",MENTION_ENABLED:"멘션 감지",GAME_BASEBALL_ENABLED:"숫자야구",GAME_LOTTO_ENABLED:"로또",GAME_WORDCHAIN_ENABLED:"끝말잇기",GAME_CHOSUNG_ENABLED:"초성게임",GAME_TYPING_ENABLED:"타자게임",GAME_BALANCE_ENABLED:"밸런스게임",GAME_SUTDA_ENABLED:"섯다",GAME_RPS_ENABLED:"가위바위보",PROFILE_DETECTION_ENABLED:"프로필(닉변) 감지",INACTIVE_USER_TRACKING:"비활성 유저 추적"
};
// 탭 → 섹션
var TABS = [
  {id:"basic", name:"⚙️ 기본설정", secs:["시스템설정","출석보너스","생일설정","타로설정"]},
  {id:"point", name:"🪙 포인트", secs:["포인트설정","럭키박스설정"]},
  {id:"game",  name:"🎮 게임", secs:["게임보상"]},
  {id:"feat",  name:"🔧 기능활성화", secs:["기능활성화"]},
  {id:"super", name:"👥 방장", custom:"super"},
  {id:"block", name:"🚫 차단", custom:"block"}
];

var roster = { users:{}, rooms:{} };
var state = { superAdmins:[], admins:[], blockedRooms:[], banned:[] };

function $(id){return document.getElementById(id);}
function fid(sec,key){return "f__"+sec+"__"+key;}
function arrHas(a,v){return a.indexOf(v)!==-1;}
function arrDel(a,v){var i=a.indexOf(v);if(i!==-1)a.splice(i,1);}
function arrAdd(a,v){if(a.indexOf(v)===-1)a.push(v);}

// ---- 탭/폼 빌드 ----
function buildTabs(){
  var nav="", pan="";
  for(var i=0;i<TABS.length;i++){
    var t=TABS[i];
    nav+='<button id="tab_'+t.id+'" class="'+(i===0?"on":"")+'" onclick="showTab(\''+t.id+'\')">'+t.name+'</button>';
    pan+='<div class="panel '+(i===0?"on":"")+'" id="panel_'+t.id+'">'+panelHtml(t)+'</div>';
  }
  $("tabs").innerHTML=nav; $("panels").innerHTML=pan;
}
function panelHtml(t){
  if(t.custom==="super") return '<div class="card"><h2 style="margin-top:0">권한 관리</h2><div class="muted" style="margin-bottom:8px">유저별로 방장 / 관리자 / 일반을 지정합니다.</div><input class="filter" id="superFilter" type="text" placeholder="닉네임 검색..." oninput="renderSuper()"><div id="superList"></div></div>';
  if(t.custom==="block") return ''+
    '<div class="card"><h2 style="margin-top:0">유저 차단(밴)</h2><div class="muted" style="margin-bottom:8px">체크하면 그 유저가 봇 사용 불가가 됩니다.</div><input class="filter" id="banFilter" type="text" placeholder="닉네임 검색..." oninput="renderBan()"><div id="banList"></div></div>'+
    '<div class="card"><h2>방 차단</h2><div class="muted" style="margin-bottom:8px">체크하면 그 방에서 봇이 비활성화됩니다.</div><div id="blockList"></div></div>';
  var h="";
  for(var s=0;s<t.secs.length;s++){
    var sec=t.secs[s], fields=SCHEMA[sec]; if(!fields)continue;
    h+='<div class="card"><h2>'+sec+'</h2>';
    for(var key in fields){
      var type=fields[key],id=fid(sec,key),ko=LABELS[key]||key;
      h+='<div class="row"><label>'+ko+'<span class="key">'+key+'</span></label>';
      if(type==="bool")h+='<input type="checkbox" id="'+id+'">';
      else if(type==="text")h+='<input type="text" class="wide" id="'+id+'">';
      else h+='<input type="number" id="'+id+'" step="'+(type==="float"?"any":"1")+'">';
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}
function showTab(id){
  var t=TABS,i;
  for(i=0;i<t.length;i++){
    $("tab_"+t[i].id).className=(t[i].id===id)?"on":"";
    $("panel_"+t[i].id).className="panel"+(t[i].id===id?" on":"");
  }
}

// ---- 설정 폼 채우기/수집 ----
function fillForm(cfg){
  for(var sec in SCHEMA){
    var fields=SCHEMA[sec],src=(cfg&&cfg[sec])?cfg[sec]:{},def=DEFAULTS[sec]||{};
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));if(!el)continue;
      var v=(src[key]!==undefined&&src[key]!==null)?src[key]:def[key];
      if(type==="bool")el.checked=!!v; else el.value=(v===undefined||v===null)?"":v;
    }
  }
}
function collectForm(){
  var out={};
  for(var sec in SCHEMA){
    out[sec]={};var fields=SCHEMA[sec];
    for(var key in fields){
      var type=fields[key],el=$(fid(sec,key));
      if(type==="bool")out[sec][key]=el.checked;
      else if(type==="text")out[sec][key]=el.value;
      else{var n=(type==="float")?parseFloat(el.value):parseInt(el.value,10);out[sec][key]=isNaN(n)?0:n;}
    }
  }
  return out;
}

// ---- 방장 탭 ----
function roleOf(hash){ if(arrHas(state.superAdmins,hash))return "super"; if(arrHas(state.admins,hash))return "admin"; return "user"; }
function setRole(hash,role){
  arrDel(state.superAdmins,hash); arrDel(state.admins,hash);
  if(role==="super")arrAdd(state.superAdmins,hash);
  else if(role==="admin")arrAdd(state.admins,hash);
  renderSuper();
}
function renderSuper(){
  var box=$("superList"); if(!box)return;
  var f=($("superFilter")&&$("superFilter").value||"").trim();
  var html="",hashes=[],h;
  for(h in roster.users)if(roster.users.hasOwnProperty(h))hashes.push(h);
  hashes.sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");});
  var shown=0;
  for(var i=0;i<hashes.length;i++){
    h=hashes[i];var nick=roster.users[h]||h;
    if(f&&nick.indexOf(f)===-1)continue;
    shown++;var role=roleOf(h);
    var badge=role==="super"?'<span class="badge b-super">방장</span>':role==="admin"?'<span class="badge b-admin">관리자</span>':'';
    html+='<div class="uitem"><div class="uname">'+esc(nick)+badge+'</div><div class="roles">'+
      '<button class="'+(role==="super"?"on super":"")+'" onclick="setRole(\''+h+'\',\'super\')">방장</button>'+
      '<button class="'+(role==="admin"?"on":"")+'" onclick="setRole(\''+h+'\',\'admin\')">관리자</button>'+
      '<button class="'+(role==="user"?"on":"")+'" onclick="setRole(\''+h+'\',\'user\')">일반</button>'+
      '</div></div>';
  }
  if(!shown)html='<div class="muted">'+(Object.keys(roster.users).length?"검색 결과 없음":"유저 목록이 비어있습니다. 봇이 켜져 roster를 올렸는지 확인하세요.")+'</div>';
  box.innerHTML=html;
}

// ---- 차단 탭 ----
function toggleBlock(key,on){ if(on)arrAdd(state.blockedRooms,key); else arrDel(state.blockedRooms,key); }
function renderBlock(){
  var box=$("blockList"); if(!box)return;
  var keys=[],seen={},k;
  for(k in roster.rooms)if(roster.rooms.hasOwnProperty(k)){keys.push(k);seen[k]=1;}
  for(var i=0;i<state.blockedRooms.length;i++)if(!seen[state.blockedRooms[i]])keys.push(state.blockedRooms[i]);
  if(!keys.length){box.innerHTML='<div class="muted">알려진 방이 없습니다. 봇이 메시지를 한 번 받은 방만 표시됩니다.</div>';return;}
  var html="";
  for(i=0;i<keys.length;i++){
    k=keys[i];var name=roster.rooms[k]||k,on=arrHas(state.blockedRooms,k);
    html+='<div class="uitem"><div class="uname">'+esc(name)+(on?'<span class="badge b-admin">차단됨</span>':'')+'</div>'+
      '<input type="checkbox" '+(on?"checked":"")+' onchange="toggleBlock(\''+jsq(k)+'\',this.checked)"></div>';
  }
  box.innerHTML=html;
}
// ---- 유저 차단(밴) ----
function toggleBan(hash,on){ if(on)arrAdd(state.banned,hash); else arrDel(state.banned,hash); renderBan(); }
function renderBan(){
  var box=$("banList"); if(!box)return;
  var f=($("banFilter")&&$("banFilter").value||"").trim();
  var hashes=[],h; for(h in roster.users)if(roster.users.hasOwnProperty(h))hashes.push(h);
  hashes.sort(function(a,b){return (roster.users[a]||"").localeCompare(roster.users[b]||"");});
  var html="",shown=0;
  for(var i=0;i<hashes.length;i++){
    h=hashes[i];var nick=roster.users[h]||h;
    if(f&&nick.indexOf(f)===-1)continue;
    shown++;var on=arrHas(state.banned,h);
    html+='<div class="uitem"><div class="uname">'+esc(nick)+(on?'<span class="badge b-ban">차단됨</span>':'')+'</div>'+
      '<input type="checkbox" '+(on?"checked":"")+' onchange="toggleBan(\''+h+'\',this.checked)"></div>';
  }
  if(!shown)html='<div class="muted">'+(Object.keys(roster.users).length?"검색 결과 없음":"유저 목록이 비어있습니다.")+'</div>';
  box.innerHTML=html;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function jsq(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}

// ---- Firebase ----
function ep(sub){
  var url=$("fbUrl").value.trim().replace(/\/+$/,""),auth=$("fbAuth").value.trim();
  if(!url){setStatus("RTDB URL을 입력하세요.",true);return null;}
  return url+sub+".json"+(auth?("?auth="+encodeURIComponent(auth)):"");
}
function setStatus(m,e){var s=$("status");s.textContent=m;s.style.color=e?"var(--err)":"var(--ok)";}
function saveConn(){try{localStorage.setItem("fbConn",JSON.stringify({url:$("fbUrl").value,auth:$("fbAuth").value}));}catch(e){}}
function loadConn(){try{var c=JSON.parse(localStorage.getItem("fbConn")||"{}");if(c.url)$("fbUrl").value=c.url;if(c.auth)$("fbAuth").value=c.auth;}catch(e){}}

function loadAll(){
  if(!ep("/botConfig"))return; saveConn(); setStatus("불러오는 중...",false);
  Promise.all([
    fetch(ep("/botConfig")).then(function(r){return r.json();}).catch(function(){return null;}),
    fetch(ep("/roster")).then(function(r){return r.json();}).catch(function(){return null;})
  ]).then(function(res){
    fillForm(res[0]||{});
    var ro=res[1]||{};
    roster.users=ro.users||{}; roster.rooms=ro.rooms||{};
    state.superAdmins=(ro.superAdmins||[]).slice();
    state.admins=(ro.admins||[]).slice();
    state.blockedRooms=(ro.blockedRooms||[]).slice();
    state.banned=(ro.banned||[]).slice();
    renderSuper(); renderBlock(); renderBan();
    setStatus("✓ 불러왔습니다."+(res[1]?"":" (roster 없음 — 봇 실행 확인)"),false);
  }).catch(function(e){setStatus("불러오기 실패: "+e,true);});
}
function saveAll(){
  if(!ep("/botConfig"))return; saveConn(); setStatus("저장 중...",false);
  var cfg=JSON.stringify(collectForm());
  var adm=JSON.stringify({superAdmins:state.superAdmins,admins:state.admins,blockedRooms:state.blockedRooms,banned:state.banned});
  Promise.all([
    fetch(ep("/botConfig"),{method:"PUT",headers:{"Content-Type":"application/json"},body:cfg}),
    fetch(ep("/adminState"),{method:"PUT",headers:{"Content-Type":"application/json"},body:adm})
  ]).then(function(rs){
    for(var i=0;i<rs.length;i++)if(!rs[i].ok)throw new Error("HTTP "+rs[i].status);
    setStatus("✓ 저장 완료! 봇이 폴링 주기 안에 반영합니다.",false);
  }).catch(function(e){setStatus("저장 실패: "+e,true);});
}

// ---- 비밀번호 잠금 ----
var PASSWORD="admin123";
function init(){
  buildTabs();
  fillForm({});
  renderSuper(); renderBlock(); renderBan();
  loadConn();
  if($("fbUrl").value) loadAll();
}
function unlock(){
  if($("pw").value===PASSWORD){ try{sessionStorage.setItem("ok","1");}catch(e){} $("gate").className="gate hidden"; init(); }
  else { $("pwErr").textContent="비밀번호가 틀렸습니다."; $("pw").value=""; }
}
var _ok=false; try{_ok=sessionStorage.getItem("ok")==="1";}catch(e){}
if(_ok){ $("gate").className="gate hidden"; init(); }
else { setTimeout(function(){ var p=$("pw"); if(p)p.focus(); },100); }
</script>
